name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test-example-plugin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - name: Build runner-package
        run: |
          npm install
          npm run build
        working-directory: ./runner-package

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./example_plugin

      - name: Run E2E Tests
        run: ./gradlew paperwrightTest
        working-directory: ./example_plugin
