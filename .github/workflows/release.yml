name: Release
on:
  push:
    tags:
      - 'v*'
jobs:
  publish:
    name: Publish and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write      # for creating GitHub releases
      id-token: write      # required for OIDC trusted publishing
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm
        run: npm install -g npm@11.5.1

      - name: Publish NPM package
        working-directory: runner-package
        run: |
          npm ci
          npm publish --access public --provenance

      - name: Publish Gradle plugin
        working-directory: gradle-plugin
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: |
          chmod +x gradlew
          ./gradlew publishPlugins

      - name: Build Changelog
        id: github_release
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          commitMode: true
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "commit_template": "- #{{TITLE}}",
              "categories": [
                {
                  "title": "## 🚀 Features",
                  "labels": ["feat"]
                },
                {
                  "title": "## 🐛 Fixes",
                  "labels": ["fix"]
                },
                {
                  "title": "## 📦 Chores & Maintenance",
                  "labels": ["chore", "refactor", "style", "docs", "test", "ci"]
                }
              ],
              "label_extractor": [
                {
                  "pattern": "^(feat|fix|docs|style|refactor|perf|test|chore|ci)(\\([\\w\\-\\.]+\\))?(!)?: (.*)",
                  "target": "$1"
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{steps.github_release.outputs.changelog}}